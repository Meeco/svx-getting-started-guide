<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meeco SVX — Getting Started Guide</title>
    <!--
      GitHub Pages serves this file for any unknown path. We stash the
      requested URL and bounce to the app root, which restores it on load.
    -->
    <script>
      sessionStorage.redirect = location.href
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/')
    </script>
  </head>
  <body></body>
</html>
